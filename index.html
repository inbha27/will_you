<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nivi ❤️</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#ff5fa2,#ffc7df);overflow:hidden;display:flex;align-items:center;justify-content:center;height:100vh}
.card{background:rgba(255,255,255,.88);padding:40px;border-radius:24px;text-align:center;box-shadow:0 12px 30px rgba(0,0,0,.2)}
h1{color:#ff2d75;font-size:52px;margin:0}
h2{color:#444}
button{padding:14px 28px;border:none;border-radius:30px;font-size:18px;margin:10px;cursor:pointer}
#yes{    background:#2ecc71;    color:#fff;}#no{    background:#e74c3c;    color:#fff;    position:relative;    min-width:220px;    white-space:nowrap;    transition:all .2s ease;}
#hearts{position:fixed;inset:0;pointer-events:none}
.heart{position:absolute;font-size:24px;animation:float 6s linear infinite}
@keyframes float{from{transform:translateY(110vh)}to{transform:translateY(-20vh)}}
</style>
</head>
<body>
<div id="hearts"></div>
<div class="card">
<h1>Nivi ❤️</h1>
<h2>Will You Be My Forever? 💖</h2>
<button id="yes">Yes ❤️</button>
<button id="no">No 😅</button>
</div>
<script>
const hc=document.getElementById('hearts');
for(let i=0;i<40;i++){let h=document.createElement('div');h.className='heart';h.textContent='❤️';h.style.left=Math.random()*100+'vw';h.style.animationDelay=Math.random()*6+'s';hc.appendChild(h);}
const no = document.getElementById("no");
const messages = [
    "Please don't 🥺",
    "Think again ❤️",
    "Pretty please? 🥹",
    "Don't break my heart 💔",
    "Come on, Nivi 😘",
    "I'll buy you ice cream 🍦",
    "You're too cute to say no 😍",
    "My heart chose you ❤️",
    "Pleaseeeee 🙏",
    "One tiny YES? 💖",
    "I already told everyone 😅",
    "You know you want to 😉",
    "I'll always make you smile 😊",
    "Forever starts with YES ❤️",
    "No isn't an option 😂"
];
let currentMessage = 0;
function moveNoButton() {
    no.innerText = messages[currentMessage];
    currentMessage = (currentMessage + 1) % messages.length;
    const maxX = window.innerWidth - no.offsetWidth - 20;
    const maxY = window.innerHeight - no.offsetHeight - 20;
    no.style.position = "fixed";
    no.style.left = Math.random() * maxX + "px";
    no.style.top = Math.random() * maxY + "px";
    no.style.transform = `rotate(${Math.random()*20-10}deg)`;
}
["mouseenter","mouseover","mousedown"].forEach(event=>{
    no.addEventListener(event,moveNoButton);
});
no.addEventListener("touchstart",function(e){
    e.preventDefault();
    moveNoButton();
},{passive:false});

document.getElementById('yes').onclick=()=>{
document.body.innerHTML=`
<div style="height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:linear-gradient(135deg,#ff5fa2,#ffc7df);color:white;text-align:center;padding:20px">
<h1 style="font-size:54px">❤️ I knew you would say YES! ❤️</h1>
<img id="gif" src="assets/cats.gif" style="width:min(360px,90vw);border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.25)">
<h2>You just made me the happiest person alive 💖</h2>
<p>Forever starts now... 🥹</p>
</div>`;
setTimeout(()=>{const g=document.getElementById('gif');if(g)g.src='assets/celebration.gif';},3000);
};
</script>
</body>
</html>
